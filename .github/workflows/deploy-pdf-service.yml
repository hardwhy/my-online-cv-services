name: Deploy PDF Service to Render

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-pdf-service.yml
      - apps/pdf-service/**
      - packages/cv-renderer/**
      - packages/shared-services/**
      - packages/shared-types/**
      - package.json
      - package-lock.json
      - nx.json
      - tsconfig.base.json
      - tsconfig.json
  workflow_dispatch:

concurrency:
  group: deploy-pdf-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pdf-service:
    name: Validate PDF service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build PDF service
        run: npx nx build pdf-service

  deploy-pdf-service:
    name: Deploy PDF service
    runs-on: ubuntu-latest
    needs: validate-pdf-service
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "$RENDER_PDF_SERVICE_DEPLOY_HOOK_URL"
        env:
          RENDER_PDF_SERVICE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PDF_SERVICE_DEPLOY_HOOK_URL }}
